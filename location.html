<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Alarm</title>
    <link href="style13.css" rel="stylesheet"/>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 600;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📍 Location Alarm</h1>
        <form id="locationForm">
            <div class="form-group">
                <label for="source">Starting Point:</label>
                <input type="text" id="source" placeholder="Enter starting location" required>
            </div>
            
            <div class="form-group">
                <label for="destination">Destination:</label>
                <input type="text" id="destination" placeholder="Enter destination" required>
            </div>
            
            <div class="form-group">
                <label for="waypoint">Waypoint:</label>
                <input type="text" id="waypoint" placeholder="Enter waypoint" required>
            </div>
            
            <button type="button" onclick="openGoogleMaps()">Open Google Maps</button>
        </form>
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        // Check authentication
        if (!localStorage.getItem('currentUser')) {
            window.location.href = 'index.html';
        }

        function openGoogleMaps() {
            const source = document.getElementById('source').value;
            const destination = document.getElementById('destination').value;
            const waypoint = document.getElementById('waypoint').value;
            
            if (!source || !destination || !waypoint) {
                alert('Please fill in all fields.');
                return;
            }

            const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(source)}&destination=${encodeURIComponent(destination)}&waypoints=${encodeURIComponent(waypoint)}`;
            window.open(mapsUrl, '_blank');
        }
    </script>
</body>
</html>
