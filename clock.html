<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link href="style2.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            color: #fff;
            width: 300px;
        }
        h1 {
            margin-bottom: 20px;
        }
        .card {
            margin-top: 10px;
            margin-bottom: 10px;
            padding: 5px;
            border: none;
            border-radius: 5px;
            width: 100%;
        }
        .but {
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #ffffff;
            color: #2575fc;
            font-weight: bold;
            cursor: pointer;
        }
        .but:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Clock Alarm</h1>
        <p>Set Date and Time:</p>
        <input type="datetime-local" id="alarmDate" class="card">
        <button onclick="setAlarm()" class="but">Set Alarm</button>
        <audio id="alarmSound" src="ringtone.mp3" preload="auto"></audio>
    </div>
    <script>
        function setAlarm() {
            const alarmDateInput = document.getElementById('alarmDate').value;
            const alarmDate = new Date(alarmDateInput);
            const now = new Date();

            if (alarmDate <= now) {
                alert('Please set a future date and time.');
                return;
            }

            const timeToAlarm = alarmDate.getTime() - now.getTime();
            setTimeout(() => {
                document.getElementById('alarmSound').play();
                alert('Wake up!');
            }, timeToAlarm);
        }
    </script>
</body>
</html>
