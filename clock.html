<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock Alarm</title>
    <link href="style2.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        input[type="datetime-local"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏰ Clock Alarm</h1>
        <input type="datetime-local" id="alarmDate">
        <button onclick="setAlarm()">Set Alarm</button>
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
    </div>

    <audio id="alarmSound" src="ringtone.mp3" preload="auto"></audio>

    <script>
        // Check authentication
        if (!localStorage.getItem('currentUser')) {
            window.location.href = 'index.html';
        }

        function setAlarm() {
            const alarmDateInput = document.getElementById('alarmDate').value;
            const alarmDate = new Date(alarmDateInput);
            const now = new Date();

            if (alarmDate <= now) {
                alert('Please set a future date and time.');
                return;
            }

            const timeToAlarm = alarmDate.getTime() - now.getTime();
            setTimeout(() => {
                document.getElementById('alarmSound').play();
                alert('Wake up!');
            }, timeToAlarm);
        }
    </script>
</body>
</html>
