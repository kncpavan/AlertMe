<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Alarm</title>
    <link href="style13.css" rel="stylesheet"/>
</head>
<body>
    <div class="container">
        <h1>📍 Location Alarm</h1>
        <form id="locationForm">
            <div class="form-group">
                <label for="source">Starting Point:</label>
                <input type="text" id="source" placeholder="Enter starting location" required>
            </div>
            
            <div class="form-group">
                <label for="destination">Destination:</label>
                <input type="text" id="destination" placeholder="Enter destination" required>
            </div>
            
            <div class="form-group">
                <label for="waypoint">Waypoint:</label>
                <input type="text" id="waypoint" placeholder="Enter waypoint" required>
            </div>
            
            <button type="button" onclick="openGoogleMaps()">Open Google Maps</button>
        </form>
        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        // Check authentication
        if (!localStorage.getItem('currentUser')) {
            window.location.href = 'index.html';
        }

        function openGoogleMaps() {
            const source = document.getElementById('source').value;
            const destination = document.getElementById('destination').value;
            const waypoint = document.getElementById('waypoint').value;
            
            if (!source || !destination || !waypoint) {
                alert('Please fill in all fields.');
                return;
            }

            const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(source)}&destination=${encodeURIComponent(destination)}&waypoints=${encodeURIComponent(waypoint)}`;
            window.open(mapsUrl, '_blank');
        }
    </script>
</body>
</html>
